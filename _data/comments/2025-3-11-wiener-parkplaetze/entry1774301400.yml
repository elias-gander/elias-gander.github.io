text: "hi Jasmin, hoffe per du ist okay!\n\nzun\xE4chst mal vielen dank f\xFCr dein\
  \ ausf\xFChrliches feedback!\n\ndu hast recht, die tats\xE4chliche anzahl an parkpl\xE4\
  tzen in wien ist wahrscheinlich gut doppelt so hoch! Ulrich Leth von der TU Wien\
  \ hat das gut argumentiert als antwort auf den post von data.gv zu meinem projekt:\
  \ https://bsky.app/profile/ulrichleth.bsky.social/post/3lnia66j6rc2k\n\nwie du auch\
  \ beobachtet hast untersch\xE4tzt mein ansatz inbesondere in randbezirken die anzahl\
  \ der parkpl\xE4tze stark. das liegt haupts\xE4chlich daran, dass parkstreifen in\
  \ siedlungsstra\xDFen nicht in der FMZK erfasst sind und in den randbezirken gibts\
  \ viele solcher siedlungsstra\xDFen.\nFMZK steht f\xFCr fl\xE4chenmehrzweckkarte,\
  \ das ist ein datensatz der stadt wien auf den mein projekt aufbaut.\n\neigentlich\
  \ wollte ich einen follow-up post mit diesen neuen erkenntnissen schreiben, bin\
  \ dann aber nie dazu gekommen. nochmal danke f\xFCr deinen kommentar, der erf\xFC\
  llt wohl auch diesen zweck :)\n\nliebe gr\xFC\xDFe\n\nElias"

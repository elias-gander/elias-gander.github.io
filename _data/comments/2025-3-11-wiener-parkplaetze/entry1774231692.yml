text:
  "Lieber Ersteller und Liebe User,\n\nerstmal m\xF6chte ich herzlich zur Fertigstellung\
  \ der Karte gratulieren und mich f\xFCr den erbrachten Aufwand und das zur Verf\xFC\
  gung stellen des Ergebnisses bedanken. \n\nDie durchdachte und systematische Umsetzung\
  \ hat bestimmt viel Aufwand und vielleicht auch Nerven gekostet. \n\nIch m\xF6chte\
  \ nur darauf hinweisen, dass die Zahlen eventuell stark verf\xE4lscht sein k\xF6\
  nnten. Damit meine ich deutlich st\xE4rker als angenommen, von kleinen Abweichungen\
  \ ist ja selbstverst\xE4ndlich auszugehen. \n\nIn einer Stichprobenartigen Ansicht\
  \ eines kleinen Ausschnitts(Randbezirk) habe ich eine Differenz zwischen Karte und\
  \ tats\xE4chlichen Gegebenheiten von ungef\xE4hr 60% feststellen k\xF6nnen. \n\n\
  Wenn man die f\xE4lschlicherweise als Parkplatz markierten Hauseinfahrten mit den\
  \ fehlenden (aber tats\xE4chlich vorhandenen) Parkpl\xE4tzen gegenrechnet, ergeben\
  \ sich trotzdem noch 53 \u201EGeisterabstellpl\xE4tze\u201C, die laut Karte nicht\
  \ existieren. \n\nNochmal kurz zusammengefasst:\nGebiet meiner Stichprobe ist mit\
  \ 102 Parkpl\xE4tzen ausgestattet. Laut Karte existieren jedoch nur 49 davon.\n\n\
  Von den 49 eingezeichneten Abstellpl\xE4tzen sind einige Ein-/Ausfahrten und somit\
  \ nicht nutzbar. \n\nKorrekt eingezeichnet waren im getesteten Bereich nur 39 Parkpl\xE4\
  tze. \n\nIch gehe davon aus, dass ich hier ein ziemlich negatives Beispiel gefunden\
  \ habe und die gesamte Karte h\xF6chstwahrscheinlich genauer und aussagekr\xE4ftiger\
  \ ist. \n\nLiebe Gr\xFC\xDFe"
